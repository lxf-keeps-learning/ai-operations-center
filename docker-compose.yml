services:
  mysql:
    image: mysql:8.4
    container_name: ai-operations-center-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ioc_ai}
      MYSQL_USER: ${MYSQL_USER:-ioc_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ioc_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${MYSQL_USER:-ioc_user} -p${MYSQL_PASSWORD:-ioc_password} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
